
name: Run Bao cao tai chinh - Cafef

on:
  schedule:
    - cron: '0 0 1 * *'   # 00:00 UTC ngày 1 hàng tháng (07:00 VN)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run ket qua kinh doanh
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bctc_cafef_kqkd.py

      - name: Run Can doi ke toan va Luu chuyen tien te
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bctc_cafef_cdkt.py
        
      - name: Run ket qua kinh doanh quy
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bctc_cafef_kqkd_quy.py
        
      - name: Run Can doi ke toan va Luu chuyen tien te quy
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bctc_cafef_cdkt_quy.py
