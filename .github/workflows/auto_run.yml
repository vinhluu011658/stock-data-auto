name: Auto Run Daily

on:
  workflow_dispatch:

jobs:
  run_daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests gspread oauth2client

      # 👉 chạy price pipeline trước
      - name: Run price_pipeline.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python price_pipeline.py

      # 👉 sau đó chạy main.py
      - name: Run main.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py

      # 👉 sau đó chạy rate.py
      - name: Run rate.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python rate.py

      # 👉 sau đó chạy bond.py
      - name: Run bond.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python bond.py
        
      - name: Done
        run: echo "Workflow hoàn tất"
